<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestarBem • Criar Conta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-soft:#f8f3f5;
      --card-bg:rgba(255,255,255,0.93);
      --primary:#ffd4e0;
      --primary-hover:#ffc5d5;
      --text:#111;
      --muted:#666;
      --border:rgba(0,0,0,0.10);
      --shadow:0 16px 40px rgba(0,0,0,0.10);
      --radius:16px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html, body{
      width:100%;
      min-height:100%;
    }

    body{
      font-family:'Barlow',sans-serif;
      color:var(--text);
      background:var(--bg-soft);
      overflow-x:hidden;
    }

    .auth-container{
      min-height:100vh;
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:40px;
      padding:24px;
      background:
        linear-gradient(rgba(255,255,255,0.06), rgba(255,255,255,0.06)),
        url("../static/img/fotosapatos.png") center/cover no-repeat;
      position:relative;
    }

    .auth-container::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(
        180deg,
        rgba(255,255,255,0.04) 0%,
        rgba(248,243,245,0.12) 100%
      );
      pointer-events:none;
    }

    .decor-box{
      position:relative;
      z-index:1;
      width:280px;
      min-width:280px;
      height:280px;
      border-radius:22px;
      background:rgba(255,255,255,0.45);
      border:1px solid rgba(255,255,255,0.6);
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:18px;
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .decor-box::before{
      content:"";
      position:absolute;
      width:220px;
      height:220px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      top:-45px;
      right:-45px;
    }

    .decor-box::after{
      content:"";
      position:absolute;
      width:140px;
      height:140px;
      border-radius:50%;
      background:rgba(255,255,255,0.05);
      bottom:-30px;
      left:-30px;
    }

    .preview-img{
      position:absolute;
      z-index:3;
      width:190px;
      height:190px;
      object-fit:cover;
      border-radius:18px;
      display:none;
      box-shadow:0 10px 24px rgba(0,0,0,0.15);
      border:3px solid rgba(255,255,255,0.9);
    }

    .upload-box{
      position:relative;
      z-index:2;
      cursor:pointer;
      text-align:center;
      color:#444;
      font-family:'Barlow',sans-serif;
      background:rgba(255,255,255,0.75);
      border:1px solid rgba(0,0,0,0.08);
      border-radius:16px;
      padding:20px 18px;
      width:100%;
      max-width:180px;
      line-height:1.5;
      transition:transform .2s ease, background .2s ease;
    }

    .upload-box:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,0.85);
    }

    .upload-box span{
      font-weight:600;
      font-size:14px;
    }

    .upload-box small{
      display:block;
      font-size:12px;
      opacity:0.8;
      font-weight:400;
      margin-top:4px;
    }

    .upload-box input{
      display:none;
    }

    .auth-form{
      position:relative;
      z-index:1;
      width:100%;
      max-width:440px;
      padding:42px 32px 30px;
      background:var(--card-bg);
      border:1px solid rgba(255,255,255,0.75);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      animation:fadeSlide .8s ease forwards;
    }

    .brand-badge{
      width:max-content;
      margin:0 auto 14px;
      padding:7px 14px;
      border-radius:999px;
      background:rgba(255,212,224,0.45);
      border:1px solid rgba(0,0,0,0.06);
      font-size:12px;
      font-weight:600;
      letter-spacing:.8px;
      text-transform:uppercase;
    }

    .auth-form h1{
      font-family:'Barlow Condensed',sans-serif;
      text-align:center;
      font-size:34px;
      letter-spacing:.8px;
      margin-bottom:8px;
    }

    .subtitle{
      text-align:center;
      font-size:14px;
      line-height:1.5;
      color:var(--muted);
      margin-bottom:26px;
    }

    .subtitle a{
      color:var(--text);
      font-weight:600;
      text-decoration:none;
    }

    .subtitle a:hover{
      text-decoration:underline;
    }

    .field{
      margin-bottom:16px;
    }

    .auth-form label{
      display:block;
      font-size:11px;
      letter-spacing:1.2px;
      font-weight:600;
      margin-bottom:7px;
    }

    .auth-form input{
      width:100%;
      padding:14px 14px;
      border:1px solid #d9d9d9;
      border-radius:10px;
      background:#fff;
      font-family:'Barlow',sans-serif;
      font-size:16px;
      color:var(--text);
      outline:none;
      transition:border-color .2s ease, box-shadow .2s ease;
    }

    .auth-form input::placeholder{
      color:#9b9b9b;
    }

    .auth-form input:focus{
      border-color:#efb3c2;
      box-shadow:0 0 0 4px rgba(255,212,224,0.30);
    }

    .auth-form button{
      width:100%;
      border:none;
      border-radius:10px;
      padding:14px;
      background:var(--primary);
      color:#111;
      font-family:'Barlow',sans-serif;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      transition:background .2s ease, transform .15s ease, box-shadow .2s ease;
      box-shadow:0 8px 20px rgba(255,212,224,0.35);
      margin-top:6px;
    }

    .auth-form button:hover{
      background:var(--primary-hover);
    }

    .auth-form button:active{
      transform:scale(.99);
    }

    .auth-footer{
      margin-top:16px;
      text-align:center;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }

    @keyframes fadeSlide{
      from{
        opacity:0;
        transform:translateY(26px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .toast{
      position:fixed;
      top:20px;
      left:50%;
      transform:translateX(-50%) translateY(-20px);
      width:calc(100% - 28px);
      max-width:420px;
      background:#fff;
      color:#111;
      padding:14px 16px;
      border-radius:12px;
      border:1px solid #ffd4e0;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      font-size:14px;
      font-weight:500;
      line-height:1.4;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transition:all .35s ease;
      z-index:9999;
    }

    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width:1024px){
      .auth-container{
        gap:24px;
        padding:22px;
      }

      .decor-box{
        width:240px;
        min-width:240px;
        height:240px;
      }

      .preview-img{
        width:160px;
        height:160px;
      }
    }

    @media (max-width:820px){
      .auth-container{
        flex-direction:column;
        gap:18px;
      }

      .decor-box{
        width:100%;
        max-width:420px;
        min-width:unset;
        height:180px;
      }

      .preview-img{
        width:120px;
        height:120px;
        border-radius:14px;
      }

      .upload-box{
        max-width:220px;
        padding:16px 14px;
      }

      .auth-form{
        max-width:100%;
      }
    }

    @media (max-width:768px){
      .auth-container{
        padding:18px;
      }

      .auth-form{
        padding:34px 22px 24px;
        border-radius:14px;
      }

      .auth-form h1{
        font-size:29px;
      }

      .subtitle{
        font-size:13px;
        margin-bottom:22px;
      }

      .auth-form input{
        padding:13px 12px;
      }

      .auth-form button{
        padding:13px;
        font-size:14px;
      }
    }

    @media (max-width:480px){
      .auth-container{
        padding:14px;
      }

      .decor-box{
        height:155px;
        border-radius:18px;
      }

      .upload-box{
        max-width:190px;
        padding:14px 12px;
      }

      .upload-box span{
        font-size:13px;
      }

      .upload-box small{
        font-size:11px;
      }

      .preview-img{
        width:105px;
        height:105px;
      }

      .auth-form{
        padding:28px 18px 20px;
      }

      .brand-badge{
        font-size:11px;
        padding:6px 12px;
      }

      .auth-form h1{
        font-size:25px;
      }

      .subtitle{
        font-size:12px;
        margin-bottom:20px;
      }

      .field{
        margin-bottom:14px;
      }

      .auth-form label{
        font-size:10px;
      }

      .auth-form input{
        font-size:16px;
        border-radius:9px;
      }

      .auth-form button{
        border-radius:9px;
      }

      .toast{
        top:14px;
        width:calc(100% - 20px);
        font-size:13px;
        padding:12px 14px;
      }
    }

    @media (max-height:700px){
      .auth-container{
        align-items:flex-start;
        padding-top:22px;
        padding-bottom:22px;
      }

      .auth-form{
        padding-top:28px;
      }
    }
  </style>
</head>

<body>

  <main class="auth-container">

    <div class="decor-box">
      <img id="preview" class="preview-img" alt="Foto do usuário">

      <label class="upload-box">
        <span>Upload de imagem</span>
        <small>(opcional)</small>
        <input id="foto" type="file" accept="image/*" onchange="previewImagem(event)">
      </label>
    </div>

    <form class="auth-form" id="formCadastro">
      <div class="brand-badge">GestarBem</div>

      <h1>CRIAR CONTA</h1>

      <p class="subtitle">
        Já possui cadastro? <a href="/login">Login</a>
      </p>

      <div class="field">
        <label for="nome">NOME</label>
        <input id="nome" name="nome" type="text" placeholder="Seu nome completo" required>
      </div>

      <div class="field">
        <label for="email">EMAIL</label>
        <input id="email" name="email" type="email" placeholder="email@exemplo.com" required>
      </div>

      <div class="field">
        <label for="telefone">TELEFONE</label>
        <input id="telefone" name="telefone" type="tel" placeholder="(00) 00000-0000">
      </div>

      <div class="field">
        <label for="semana_gestacional">SEMANA GESTACIONAL</label>
        <input id="semana_gestacional" name="semana_gestacional" type="number" min="1" max="42" placeholder="Ex: 20" required>
      </div>

      <div class="field">
        <label for="senha">SENHA</label>
        <input id="senha" name="senha" type="password" placeholder="••••••" required>
      </div>

      <div class="field">
        <label for="confirmarSenha">CONFIRMAR SENHA</label>
        <input id="confirmarSenha" name="confirmarSenha" type="password" placeholder="••••••" required>
      </div>

      <button type="submit">Criar conta</button>

      <div class="auth-footer">
        Crie sua conta para acompanhar sua gestação com mais cuidado, organização e tranquilidade.
      </div>
    </form>

  </main>

  <div id="toast" class="toast"></div>

  <script>
    function previewImagem(event){
      const file = event.target.files[0];
      if(!file) return;

      const img = document.getElementById("preview");
      img.src = URL.createObjectURL(file);
      img.style.display = "block";
    }

    function showToast(message){
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");

      setTimeout(() => {
        toast.classList.remove("show");
      }, 3000);
    }

    document.getElementById("formCadastro").addEventListener("submit", async (e) => {
      e.preventDefault();

      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();
      const telefone = document.getElementById("telefone").value.trim();
      const semana = Number(document.getElementById("semana_gestacional").value);
      const senha = document.getElementById("senha").value;
      const confirmar = document.getElementById("confirmarSenha").value;

      if(senha !== confirmar){
        showToast("As senhas não coincidem.");
        return;
      }

      if(!Number.isInteger(semana) || semana < 1 || semana > 42){
        showToast("Semana gestacional inválida. Use um número entre 1 e 42.");
        return;
      }

      try{
        const resp = await fetch("/api/cadastro", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({
            nome,
            email,
            telefone,
            semana_gestacional: semana,
            senha
          })
        });

        const data = await resp.json();

        if(!resp.ok){
          showToast(data.message || "Erro ao cadastrar.");
          return;
        }

        showToast(data.message || "Cadastro realizado com sucesso!");

        setTimeout(() => {
          window.location.href = "/login";
        }, 2000);

      } catch(err){
        showToast("Não consegui conectar no servidor. Verifique se o app.py está rodando.");
      }
    });
  </script>

</body>
</html>
